services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: goloom-app
    restart: unless-stopped
    environment:
      APP_ENV: development
      HTTP_ADDR: :8080
      DATABASE_URL: file:/app/data/goloom.db
      ENCRYPTION_KEY: change-this-development-key-to-a-long-random-secret
      ALLOWED_ORIGINS: http://localhost:4173,http://localhost:5173,http://localhost:3000
      RATE_LIMIT_PER_MINUTE: 60
      SCHEDULER_POLL_INTERVAL: 15s
      SCHEDULER_WORKERS: 4
      BOOTSTRAP_ADMIN_EMAIL: admin@localhost
      BOOTSTRAP_ADMIN_NAME: Local Administrator
      BOOTSTRAP_ADMIN_TOKEN: change-this-bootstrap-token
      OIDC_ISSUER_URL: ""
      OIDC_CLIENT_ID: ""
      OIDC_CLIENT_SECRET: ""
    ports:
      - "8080:8080"
    volumes:
      - goloom_data:/app/data

  db:
    image: postgres:16
    container_name: goloom-db
    restart: unless-stopped
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: goloom
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d goloom"]
      interval: 5s
      timeout: 5s
      retries: 10

  app-postgres:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: goloom-app-postgres
    restart: unless-stopped
    profiles: ["postgres"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: development
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://postgres:postgres@db:5432/goloom?sslmode=disable
      ENCRYPTION_KEY: change-this-development-key-to-a-long-random-secret
      ALLOWED_ORIGINS: http://localhost:4173,http://localhost:5173,http://localhost:3000
      RATE_LIMIT_PER_MINUTE: 60
      SCHEDULER_POLL_INTERVAL: 15s
      SCHEDULER_WORKERS: 4
      BOOTSTRAP_ADMIN_EMAIL: admin@localhost
      BOOTSTRAP_ADMIN_NAME: Local Administrator
      BOOTSTRAP_ADMIN_TOKEN: change-this-bootstrap-token
      OIDC_ISSUER_URL: ""
      OIDC_CLIENT_ID: ""
      OIDC_CLIENT_SECRET: ""
    ports:
      - "8081:8080"

volumes:
  goloom_data:
  postgres_data:
