name: Nightly image

# Development happens on feature branches; after testing they are merged into
# main. Every push to main publishes a nightly container image built from the
# latest main state: ghcr.io/<repo>:nightly plus a per-commit sha tag.
# Releases are unchanged: release-please tags vX.Y.Z and release.yml ships
# the versioned image and :latest.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    name: Build and push :nightly image
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Image refs must be lowercase; github.repository may contain uppercase.
      - name: Compute image name
        id: img
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=nightly-${{ github.sha }}
          tags: |
            ${{ steps.img.outputs.image }}:nightly
            ${{ steps.img.outputs.image }}:nightly-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
