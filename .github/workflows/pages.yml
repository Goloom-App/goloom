name: Deploy website to GitHub Pages

# Builds the Astro/Starlight site (landing page + docs + API reference) and
# publishes it to the org Pages repo `Goloom-App/goloom-app.github.io`, which
# GitHub serves at the root URL https://goloom-app.github.io/.
#
# Cross-repo deploy: the built `website/dist` is force-pushed to the Pages repo's
# default branch with an SSH deploy key. Prerequisites (one-time):
#   1. Repo `Goloom-App/goloom-app.github.io` exists and is public, with Pages
#      enabled (Deploy from branch: main / root).
#   2. A write deploy key on that repo whose private half is stored here as the
#      Actions secret `PAGES_DEPLOY_KEY`.

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "docs/api/**"
      - "Makefile"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    name: Build and deploy website
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Build website
        run: make website-build
        env:
          CI: "true"

      - name: Deploy to org Pages repo
        env:
          DEPLOY_KEY: ${{ secrets.PAGES_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_KEY:-}" ]; then
            echo "Missing PAGES_DEPLOY_KEY secret" >&2
            exit 1
          fi

          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/pages_deploy
          chmod 600 ~/.ssh/pages_deploy
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/pages_deploy -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"

          # Publish a fresh single-commit history to keep the Pages repo small.
          # .nojekyll stops GitHub Pages from running Jekyll over the static output.
          cd website/dist
          touch .nojekyll
          git init -q
          git checkout -q -b main
          git config user.name "goloom-ci"
          git config user.email "ci@goloom-app.github.io"
          git add -A
          git commit -q -m "Deploy website from ${GITHUB_SHA}"
          git push -f git@github.com:Goloom-App/goloom-app.github.io.git main:main
