name: Dev image

# Publishes a testable container image for every push to the dev branch:
# ghcr.io/<repo>:dev plus a per-commit sha tag. Complements release.yml,
# which only ships tagged releases from main.

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    name: Build and push :dev image
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Image refs must be lowercase; github.repository may contain uppercase.
      - name: Compute image name
        id: img
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=dev-${{ github.sha }}
          tags: |
            ${{ steps.img.outputs.image }}:dev
            ${{ steps.img.outputs.image }}:dev-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
