name: CI/CD Workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Matrix = two jobs from one definition; runners execute them in parallel when capacity allows.
  # Base images: GHCR mirror of Docker Hub (avoids Docker Hub anonymous rate limits). See
  # https://github.com/psarossy/dockerhub-mirror — replace with your org's copies if you prefer.
  test:
    name: ${{ matrix.name }}
    runs-on: docker
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Test Backend (Go)"
            image: ghcr.io/psarossy/golang:1.26.2-alpine3.22
            suite: backend
          - name: "Test Frontend (Node.js)"
            image: ghcr.io/psarossy/node:lts
            suite: frontend
    container:
      image: ${{ matrix.image }}
    steps:
      # actions/checkout and actions/cache are JavaScript actions: act_runner exec's
      # `node` inside the job container, so the Go image must include Node even though
      # tests only invoke `go`.
      - name: Install git and Node (backend image)
        if: matrix.suite == 'backend'
        run: apk add --no-cache git nodejs

      - name: Install git (frontend image)
        if: matrix.suite == 'frontend'
        run: |
          if command -v apk >/dev/null 2>&1; then
            apk add --no-cache git
          elif command -v apt-get >/dev/null 2>&1; then
            apt-get update
            apt-get install -y --no-install-recommends git
            rm -rf /var/lib/apt/lists/*
          else
            command -v git
          fi

      - uses: actions/checkout@v4

      - name: Go module and build cache
        if: matrix.suite == 'backend'
        uses: actions/cache@v4
        with:
          path: |
            /root/.cache/go-build
            /go/pkg/mod
          key: forgejo-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            forgejo-go-

      - name: Run Go tests
        if: matrix.suite == 'backend'
        run: go test -count=1 -v ./...

      - name: Enable pnpm (Corepack)
        if: matrix.suite == 'frontend'
        run: corepack enable && corepack prepare pnpm@10 --activate

      - name: Frontend install and build
        if: matrix.suite == 'frontend'
        run: |
          pnpm --dir frontend install --frozen-lockfile
          pnpm --dir frontend build

  build-docker:
    name: Build Docker Image
    needs: [test]
    runs-on: docker
    # Default job images have no `docker` binary. Use the official CLI image (via
    # Google’s Docker Hub mirror) and attach the host daemon socket so `docker build`
    # talks to the runner’s Docker.
    #
    # act_runner: allow this bind in config, e.g.
    #   container:
    #     valid_volumes:
    #       - /var/run/docker.sock
    #       - '**'   # only if you accept the security trade-offs
    container:
      image: mirror.gcr.io/library/docker:cli
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
    steps:
      - name: Install git and Node (for actions/checkout)
        run: apk add --no-cache git nodejs

      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t goloom:latest .
