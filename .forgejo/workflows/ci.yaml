name: CI/CD Workflow

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: docker
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Test Backend (Go)"
            image: ghcr.io/psarossy/golang:1.26.2-alpine3.22
            suite: backend
          - name: "Test Frontend (Node.js)"
            image: ghcr.io/psarossy/node:lts
            suite: frontend

    container:
      image: ${{ matrix.image }}
    steps:
      - name: Install Runtime Deps (Git/Node for Checkout)
        run: |
          apk add --no-cache git nodejs npm 2>/dev/null || \
          (apt-get update && apt-get install -y git nodejs)

      - uses: actions/checkout@v4

      - name: Go Tests
        if: matrix.suite == 'backend'
        run: |
          export GOCACHE=/tmp/go-build
          go test -v ./...

      - name: Frontend Build
        if: matrix.suite == 'frontend'
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
          pnpm --dir frontend install --frozen-lockfile
          pnpm --dir frontend build

  publish-image:
    name: Build & Publish
    needs: [test]
    if: github.event_name == 'push'
    runs-on: docker
    outputs:
      image_ref: ${{ steps.registry.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Registry & Image Ref
        id: registry
        run: |
          DOMAIN="${GITHUB_SERVER_URL#*//}"
          echo "domain=${DOMAIN}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${DOMAIN}/${GITHUB_REPOSITORY}:sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.registry.outputs.domain }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.registry.outputs.domain }}/${{ github.repository }}
          tags: |
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Trigger Dockhand Deployment
    needs: [publish-image]
    if: github.ref == 'refs/heads/main'
    runs-on: docker
    container:
      image: alpine:3.23
    steps:
      - name: Trigger Webhook
        run: |
          apk add --no-cache curl
          curl --fail -X POST "${{ secrets.DOCKHAND_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.DOCKHAND_WEBHOOK_TOKEN }}" \
            -d '{"image_ref":"${{ needs.publish-image.outputs.image_ref }}"}'