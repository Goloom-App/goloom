name: CI/CD Workflow

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: docker
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Test Backend (Go)"
            image: golang:1.22-alpine # Standard-Images nutzen, falls möglich
            suite: backend
          - name: "Test Frontend (Node.js)"
            image: node:20-alpine
            suite: frontend

    container:
      image: ${{ matrix.image }}
    steps:
      # Zentrales Setup für Forgejo Runner (Node & Git werden für Actions benötigt)
      - name: Install Runtime Deps
        run: |
          apk add --no-cache git nodejs npm 2>/dev/null || \
          (apt-get update && apt-get install -y git nodejs)

      - uses: actions/checkout@v4

      # Backend Logic
      - name: Go Tests
        if: matrix.suite == 'backend'
        run: |
          export GOCACHE=/tmp/go-build
          go test -v ./...

      # Frontend Logic
      - name: Frontend Build
        if: matrix.suite == 'frontend'
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
          pnpm --dir frontend install --frozen-lockfile
          pnpm --dir frontend build

  publish-image:
    name: Build & Publish
    needs: [test]
    if: github.event_name == 'push'
    runs-on: docker
    container:
      image: quay.io/buildah/stable:v1.41
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - name: Install Node/Git
        run: apk add --no-cache git nodejs
      
      - uses: actions/checkout@v4

      - name: Image Meta & Login
        id: meta
        env:
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          REGISTRY="${GITHUB_SERVER_URL#*//}"
          IMAGE_REPO="${REGISTRY}/${GITHUB_REPOSITORY}"
          SHA_TAG="sha-${GITHUB_SHA::7}"
          
          echo "${REGISTRY_PASSWORD}" | buildah login -u "${REGISTRY_USER}" --password-stdin "${REGISTRY}"
          
          echo "image_ref=${IMAGE_REPO}:${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "repo=${IMAGE_REPO}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and Push
        run: |
          export STORAGE_DRIVER=vfs
          IMAGE="${{ steps.meta.outputs.image_ref }}"
          LATEST="${{ steps.meta.outputs.repo }}:latest"
          
          buildah bud --format docker -t "$IMAGE" .
          buildah tag "$IMAGE" "$LATEST"
          
          buildah push "$IMAGE" "docker://$IMAGE"
          buildah push "$LATEST" "docker://$LATEST"
          
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG_REF="${{ steps.meta.outputs.repo }}:${{ github.ref_name }}"
            buildah tag "$IMAGE" "$TAG_REF"
            buildah push "$TAG_REF" "docker://$TAG_REF"
          fi

  deploy:
    name: Deploy
    needs: [publish-image]
    if: github.ref == 'refs/heads/main'
    runs-on: docker
    container: image: alpine:3.22
    steps:
      - name: Webhook
        run: |
          apk add --no-cache curl
          curl --fail -X POST "${{ secrets.DOCKHAND_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.DOCKHAND_WEBHOOK_TOKEN }}" \
            -d '{"image_ref":"${{ needs.publish-image.outputs.image_ref }}"}'