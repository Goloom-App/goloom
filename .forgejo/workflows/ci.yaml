name: CI/CD Workflow

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: docker
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Test Backend (Go)"
            image: ghcr.io/psarossy/golang:1.26.2-alpine3.22
            suite: backend
          - name: "Test Frontend (Node.js)"
            image: ghcr.io/psarossy/node:lts
            suite: frontend
    container:
      image: ${{ matrix.image }}
    steps:
      - name: Install git and Node (backend image)
        if: matrix.suite == 'backend'
        run: apk add --no-cache git nodejs

      - name: Install git (frontend image)
        if: matrix.suite == 'frontend'
        run: |
          if command -v apk >/dev/null 2>&1; then
            apk add --no-cache git
          elif command -v apt-get >/dev/null 2>&1; then
            apt-get update
            apt-get install -y --no-install-recommends git
            rm -rf /var/lib/apt/lists/*
          else
            command -v git
          fi

      - uses: actions/checkout@v4

      - name: Go module and build cache
        if: matrix.suite == 'backend'
        uses: actions/cache@v4
        with:
          path: |
            /root/.cache/go-build
            /go/pkg/mod
          key: forgejo-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            forgejo-go-

      - name: Run Go tests
        if: matrix.suite == 'backend'
        run: go test -count=1 -v ./...

      - name: Enable pnpm (Corepack)
        if: matrix.suite == 'frontend'
        run: corepack enable && corepack prepare pnpm@10 --activate

      - name: Frontend install and build
        if: matrix.suite == 'frontend'
        run: |
          pnpm --dir frontend install --frozen-lockfile
          pnpm --dir frontend build

  publish-image:
    runs-on: docker
    name: Build and Publish Docker Image
    needs: [test]
    if: github.event_name == 'push'
    container:
      image: docker:cli
    outputs:
      image_ref: ${{ steps.image-meta.outputs.image_ref }}
    steps:
      - name: Install git and Node (for actions/checkout)
        run: apk add --no-cache git nodejs bash

      - uses: actions/checkout@v4

      - name: Compute registry and tags
        id: image-meta
        env:
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          registry_host="${SERVER_URL#https://}"
          registry_host="${registry_host#http://}"
          registry_host="${registry_host%%/*}"
          image_repo="${registry_host}/${REPOSITORY}"
          sha_tag="sha-${SHA}"

          if [ "${REF_TYPE}" = "tag" ]; then
            release_tag="${REF_NAME}"
            tags="${image_repo}:${sha_tag} ${image_repo}:${release_tag} ${image_repo}:latest"
          else
            tags="${image_repo}:${sha_tag} ${image_repo}:latest"
          fi

          image_ref="${image_repo}:${sha_tag}"
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${image_ref}" >> "$GITHUB_OUTPUT"

      - name: Docker login
        env:
          SERVER_URL: ${{ github.server_url }}
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          if [ -z "${REGISTRY_USER}" ] || [ -z "${REGISTRY_PASSWORD}" ]; then
            echo "Missing REGISTRY_USER or REGISTRY_PASSWORD secret"
            exit 1
          fi
          
          registry_host="${SERVER_URL#https://}"
          registry_host="${registry_host#http://}"
          registry_host="${registry_host%%/*}"
          
          echo "${REGISTRY_PASSWORD}" | docker login "${registry_host}" -u "${REGISTRY_USER}" --password-stdin

      - name: Build and push image
        env:
          TAGS: ${{ steps.image-meta.outputs.tags }}
        run: |
          first_tag="${TAGS%% *}"
          
          # Build image once
          docker build -t "${first_tag}" .
          
          # Tag and push all tags
          for tag in ${TAGS}; do
            if [ "${tag}" != "${first_tag}" ]; then
              docker tag "${first_tag}" "${tag}"
            fi
            docker push "${tag}"
          done

  deploy-dockhand:
    runs-on: docker
    name: Trigger Dockhand Deployment
    needs: [publish-image]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    container:
      image: mirror.gcr.io/library/alpine:3.22
    steps:
      - name: Trigger Dockhand webhook
        env:
          DOCKHAND_WEBHOOK_URL: ${{ secrets.DOCKHAND_WEBHOOK_URL }}
          DOCKHAND_WEBHOOK_TOKEN: ${{ secrets.DOCKHAND_WEBHOOK_TOKEN }}
          IMAGE_REF: ${{ needs.publish-image.outputs.image_ref }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -z "${DOCKHAND_WEBHOOK_URL}" ]; then
            echo "Missing DOCKHAND_WEBHOOK_URL secret"
            exit 1
          fi

          apk add --no-cache curl

          payload="{\"repository\":\"${REPOSITORY}\",\"ref\":\"${REF_NAME}\",\"sha\":\"${SHA}\",\"image_ref\":\"${IMAGE_REF}\"}"

          if [ -n "${DOCKHAND_WEBHOOK_TOKEN}" ]; then
            curl --fail --show-error --silent \
              -X POST "${DOCKHAND_WEBHOOK_URL}" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${DOCKHAND_WEBHOOK_TOKEN}" \
              -d "${payload}"
          else
            curl --fail --show-error --silent \
              -X POST "${DOCKHAND_WEBHOOK_URL}" \
              -H "Content-Type: application/json" \
              -d "${payload}"
          fi
