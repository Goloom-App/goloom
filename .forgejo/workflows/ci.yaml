name: CI/CD Workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-go:
    name: Test Backend (Go)
    runs-on: docker
    # Pre-built toolchain (avoids actions/setup-go downloading/extracting Go each run).
    container:
      image: golang:1.26-alpine
    steps:
      # golang:alpine is minimal; checkout needs git in PATH.
      - run: apk add --no-cache git

      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            /root/.cache/go-build
            /go/pkg/mod
          key: forgejo-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            forgejo-go-

      - name: Run Tests
        run: go test -count=1 -v ./...

  test-frontend:
    name: Test Frontend (Node.js)
    runs-on: docker
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Build Frontend
        run: pnpm --dir frontend build

  build-docker:
    name: Build Docker Image
    needs: [test-go, test-frontend]
    runs-on: docker
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t goloom:latest .
