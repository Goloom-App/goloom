name: CI/CD Workflow

on:
  push:
    # dev publishes a :dev image for testing; see publish-image tag logic.
    branches: [ "main", "dev" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Detect which parts of the repo changed so downstream jobs can be skipped.
  # Implemented with plain git (no third-party action) to stay portable on the
  # Forgejo act_runner. A docs-only change (e.g. README) leaves every test/build
  # output 'false', so only this tiny job and the secret scan run.
  changes:
    runs-on: docker
    name: "Detect changed paths"
    container:
      image: alpine:3.24
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      e2e: ${{ steps.filter.outputs.e2e }}
      image: ${{ steps.filter.outputs.image }}
    steps:
      - name: Install git and Node (for actions)
        run: apk add --no-cache git nodejs

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Determine changed files
        id: filter
        env:
          EVENT: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          BEFORE: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          full_run() {
            for k in backend frontend e2e image; do
              echo "$k=true" >> "$GITHUB_OUTPUT"
              echo "$k=true"
            done
          }

          # Tag builds (releases) always run everything.
          if [ "$EVENT" = "push" ] && [ "$REF_TYPE" = "tag" ]; then
            echo "Tag push: running all suites"
            full_run
            exit 0
          fi

          if [ "$EVENT" = "pull_request" ]; then
            base="$BASE_SHA"
          else
            base="$BEFORE"
          fi

          # New branch / unknown base / first commit → no usable diff base: run all.
          if [ -z "${base:-}" ] || [ "$base" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
            echo "No usable base ref ('${base:-}'); running all suites"
            full_run
            exit 0
          fi

          changed="$(git diff --name-only "$base" HEAD)"
          echo "Base: $base"
          echo "Changed files:"
          echo "$changed"

          match() {
            if printf '%s\n' "$changed" | grep -Eq "$1"; then echo true; else echo false; fi
          }

          ci='^\.forgejo/workflows/ci\.yaml$'
          backend=$(match "\.go$|^go\.(mod|sum)$|$ci")
          frontend=$(match "^frontend/|$ci")
          e2e=$(match "\.go$|^go\.(mod|sum)$|^frontend/|$ci")
          image=$(match "\.go$|^go\.(mod|sum)$|^frontend/|^locales/|^Dockerfile$|^\.dockerignore$|$ci")

          for k in backend frontend e2e image; do
            eval "v=\$$k"
            echo "$k=$v" >> "$GITHUB_OUTPUT"
            echo "$k=$v"
          done

  test-backend:
    runs-on: docker
    name: "Test Backend (Go)"
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    container:
      image: ghcr.io/psarossy/golang:1.26.3-alpine3.22
    steps:
      - name: Install git and Node
        run: apk add --no-cache git nodejs tar zstd

      - uses: actions/checkout@v7

      # The pinned golang container ships an older patch than go.mod requires
      # (go 1.26.4), and the in-runner GOTOOLCHAIN=auto download of that patch
      # fails — so acquire the exact toolchain from go.mod via setup-go, the
      # same mechanism the green E2E job already uses.
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Go module and build cache
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: forgejo-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            forgejo-go-

      - name: Go vet
        run: go vet ./...

      - name: Run Go tests
        run: go test -count=1 -v ./...

  test-frontend:
    runs-on: docker
    name: "Test Frontend (Node.js)"
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    container:
      image: ghcr.io/psarossy/node:lts
    steps:
      - name: Install git
        run: |
          if command -v apk >/dev/null 2>&1; then
            apk add --no-cache git
          elif command -v apt-get >/dev/null 2>&1; then
            apt-get update
            apt-get install -y --no-install-recommends git tar zstd
            rm -rf /var/lib/apt/lists/*
          fi

      - uses: actions/checkout@v7

      - name: Frontend install and build cache
        uses: actions/cache@v6
        with:
          path: ~/.local/share/pnpm/store/v3
          key: forgejo-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            forgejo-pnpm-

      - name: Install pnpm
        run: |
          set -euo pipefail
          corepack enable
          PNPM_VERSION="$(node -p "require('./frontend/package.json').packageManager.split('@')[1]")"
          # Exact version avoids corepack querying npm for all pnpm@10 releases (often blocked in CI).
          if ! corepack prepare "pnpm@${PNPM_VERSION}" --activate; then
            echo "corepack prepare failed; installing pnpm ${PNPM_VERSION} from GitHub release"
            mkdir -p "${HOME}/.local/bin"
            curl -fsSL "https://github.com/pnpm/pnpm/releases/download/v${PNPM_VERSION}/pnpm-linux-x64" \
              -o "${HOME}/.local/bin/pnpm"
            chmod +x "${HOME}/.local/bin/pnpm"
            echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          fi
          pnpm --version

      - name: Frontend install, lint and build
        run: |
          pnpm --dir frontend install --frozen-lockfile
          pnpm --dir frontend lint
          pnpm --dir frontend build

  test-e2e:
    runs-on: docker
    name: "E2E (Playwright + Go)"
    needs: changes
    if: needs.changes.outputs.e2e == 'true'
    container:
      image: ghcr.io/psarossy/node:lts
    steps:
      - name: Install git
        run: |
          if command -v apk >/dev/null 2>&1; then
            apk add --no-cache git
          elif command -v apt-get >/dev/null 2>&1; then
            apt-get update
            apt-get install -y --no-install-recommends git tar zstd
            rm -rf /var/lib/apt/lists/*
          fi

      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Go module and build cache
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: forgejo-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            forgejo-go-

      - name: Frontend install and build cache
        uses: actions/cache@v6
        with:
          path: ~/.local/share/pnpm/store/v3
          key: forgejo-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            forgejo-pnpm-

      - name: Playwright browser cache
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/ms-playwright
            ~/.cache/playwright
          key: forgejo-playwright-${{ hashFiles('frontend/package.json') }}
          restore-keys: |
            forgejo-playwright-

      - name: Install pnpm
        run: |
          set -euo pipefail
          corepack enable
          PNPM_VERSION="$(node -p "require('./frontend/package.json').packageManager.split('@')[1]")"
          if ! corepack prepare "pnpm@${PNPM_VERSION}" --activate; then
            echo "corepack prepare failed; installing pnpm ${PNPM_VERSION} from GitHub release"
            mkdir -p "${HOME}/.local/bin"
            curl -fsSL "https://github.com/pnpm/pnpm/releases/download/v${PNPM_VERSION}/pnpm-linux-x64" \
              -o "${HOME}/.local/bin/pnpm"
            chmod +x "${HOME}/.local/bin/pnpm"
            echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          fi
          pnpm --version

      - name: E2E — install frontend deps
        run: pnpm --dir frontend install --frozen-lockfile

      - name: E2E — Playwright Chromium + OS dependencies
        run: |
          pnpm --dir frontend exec playwright install-deps chromium
          pnpm --dir frontend exec playwright install chromium

      - name: E2E — Playwright tests
        run: pnpm --dir frontend test:e2e

  # The postgres store tests skip without TEST_POSTGRES_URL, so 'go test ./...'
  # alone never exercises them — this job is the gate for the Postgres backend
  # (fresh schema apply + full store suite against a real server).
  test-postgres:
    runs-on: docker
    name: "Test Postgres Store"
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    container:
      image: ghcr.io/psarossy/golang:1.26.3-alpine3.22
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: goloom_test
    steps:
      - name: Install git and Node (for actions)
        run: apk add --no-cache git nodejs tar zstd

      - uses: actions/checkout@v7

      # The pinned golang container ships an older patch than go.mod requires
      # (go 1.26.4), and the in-runner GOTOOLCHAIN=auto download of that patch
      # fails — so acquire the exact toolchain from go.mod via setup-go, the
      # same mechanism the green E2E job already uses.
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Go module and build cache
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: forgejo-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            forgejo-go-

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            nc -z postgres 5432 && exit 0
            sleep 1
          done
          echo "postgres did not become ready" >&2
          exit 1

      - name: Run Postgres store tests
        env:
          TEST_POSTGRES_URL: postgres://postgres:test@postgres:5432/goloom_test?sslmode=disable
        run: go test -count=1 -v ./internal/store/postgres/

  # Go vulnerability scan (govulncheck) + static security analysis (gosec).
  # govulncheck only reports advisories reachable from code actually used, so it
  # blocks the build on real exposure. gosec blocks only on high-severity findings.
  security-go:
    runs-on: docker
    name: "Security (Go: govulncheck + gosec)"
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    container:
      image: ghcr.io/psarossy/golang:1.26.3-alpine3.22
    steps:
      - name: Install git and Node (for actions)
        run: apk add --no-cache git nodejs tar zstd

      - uses: actions/checkout@v7

      # The pinned golang container ships an older patch than go.mod requires
      # (go 1.26.4), and the in-runner GOTOOLCHAIN=auto download of that patch
      # fails — so acquire the exact toolchain from go.mod via setup-go, the
      # same mechanism the green E2E job already uses.
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Go module and build cache
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: forgejo-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            forgejo-go-

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...

      - name: gosec (block on high severity)
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          # -severity high: only high-severity issues fail the build (-> exit non-zero).
          "$(go env GOPATH)/bin/gosec" -severity high -confidence medium ./...

  # Secret scan runs on every change (cheap, repo-wide) — not path-gated, since a
  # leaked credential can land in any file. Fails the build on any detected secret.
  secret-scan:
    runs-on: docker
    name: "Security (Secrets: gitleaks)"
    container:
      image: ghcr.io/psarossy/node:lts
    steps:
      - name: Install git, curl and tar
        run: |
          if command -v apk >/dev/null 2>&1; then
            apk add --no-cache git curl tar
          elif command -v apt-get >/dev/null 2>&1; then
            apt-get update
            apt-get install -y --no-install-recommends git curl tar ca-certificates
            rm -rf /var/lib/apt/lists/*
          fi

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION=8.21.2
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan git history for secrets
        run: gitleaks detect --source=. --redact --verbose

  publish-image:
    runs-on: docker
    name: Build and Publish Docker Image
    needs: [changes, test-backend, test-frontend, test-e2e, test-postgres, security-go, secret-scan]
    # Build on push when image-relevant files changed, and only if no upstream
    # job failed (skipped jobs report 'skipped', which must not block the build).
    if: |
      always() &&
      github.event_name == 'push' &&
      needs.changes.outputs.image == 'true' &&
      needs.test-backend.result != 'failure' &&
      needs.test-frontend.result != 'failure' &&
      needs.test-e2e.result != 'failure' &&
      needs.test-postgres.result != 'failure' &&
      needs.security-go.result != 'failure' &&
      needs.secret-scan.result != 'failure'
    container:
      image: docker:cli
    outputs:
      image_ref: ${{ steps.image-meta.outputs.image_ref }}
    steps:
      - name: Install git and Node (for actions/checkout)
        run: apk add --no-cache git nodejs bash

      - uses: actions/checkout@v7

      - name: Compute registry and tags
        id: image-meta
        env:
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          registry_host="${SERVER_URL#https://}"
          registry_host="${registry_host#http://}"
          registry_host="${registry_host%%/*}"
          image_repo="${registry_host}/${REPOSITORY}"
          sha_tag="sha-${SHA}"

          if [ "${REF_TYPE}" = "tag" ]; then
            release_tag="${REF_NAME}"
            tags="${image_repo}:${sha_tag} ${image_repo}:${release_tag} ${image_repo}:latest"
          elif [ "${REF_NAME}" = "main" ]; then
            tags="${image_repo}:${sha_tag} ${image_repo}:latest"
          else
            # Non-main branches (e.g. dev) publish under their branch name so
            # the build can be pulled for testing without touching :latest.
            tags="${image_repo}:${sha_tag} ${image_repo}:${REF_NAME}"
          fi

          image_ref="${image_repo}:${sha_tag}"
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${image_ref}" >> "$GITHUB_OUTPUT"

      - name: Docker login
        env:
          SERVER_URL: ${{ github.server_url }}
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          if [ -z "${REGISTRY_USER}" ] || [ -z "${REGISTRY_PASSWORD}" ]; then
            echo "Missing REGISTRY_USER or REGISTRY_PASSWORD secret"
            exit 1
          fi

          registry_host="${SERVER_URL#https://}"
          registry_host="${registry_host#http://}"
          registry_host="${registry_host%%/*}"

          echo "${REGISTRY_PASSWORD}" | docker login "${registry_host}" -u "${REGISTRY_USER}" --password-stdin

      - name: Build and push image
        env:
          TAGS: ${{ steps.image-meta.outputs.tags }}
        run: |
          first_tag="${TAGS%% *}"

          # Build image once
          docker build -t "${first_tag}" .

          # Tag and push all tags
          for tag in ${TAGS}; do
            if [ "${tag}" != "${first_tag}" ]; then
              docker tag "${first_tag}" "${tag}"
            fi
            docker push "${tag}"
          done

  deploy-dockhand:
    runs-on: docker
    name: Trigger Dockhand Deployment
    needs: [publish-image]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.publish-image.result == 'success'
    container:
      image: alpine:3.24
    steps:
      - name: Trigger Dockhand webhook
        env:
          DOCKHAND_WEBHOOK_URL: ${{ secrets.DOCKHAND_WEBHOOK_URL }}
          DOCKHAND_WEBHOOK_TOKEN: ${{ secrets.DOCKHAND_WEBHOOK_TOKEN }}
          IMAGE_REF: ${{ needs.publish-image.outputs.image_ref }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -z "${DOCKHAND_WEBHOOK_URL}" ]; then
            echo "Error: DOCKHAND_WEBHOOK_URL is not set"
            exit 1
          fi

          apk add --no-cache curl jq openssl

          # Create a clean JSON payload
          payload=$(jq -nc \
            --arg repo "$REPOSITORY" \
            --arg ref "$REF_NAME" \
            --arg sha "$SHA" \
            --arg img "$IMAGE_REF" \
            '{repository: $repo, ref: $ref, sha: $sha, image_ref: $img}')

          echo "Triggering webhook to ${DOCKHAND_WEBHOOK_URL}"

          if [ -n "${DOCKHAND_WEBHOOK_TOKEN}" ]; then
            # Calculate HMAC-SHA256 signature (X-Hub-Signature-256 style)
            # The signature must be the hex digest of the HMAC of the payload using the token as key.
            sig=$(echo -n "$payload" | openssl dgst -sha256 -hmac "${DOCKHAND_WEBHOOK_TOKEN}" | sed 's/^.* //')

            curl --fail --show-error --silent \
              -X POST "${DOCKHAND_WEBHOOK_URL}" \
              -H "Content-Type: application/json" \
              -H "X-Hub-Signature-256: sha256=${sig}" \
              -d "${payload}"
          else
            curl --fail --show-error --silent \
              -X POST "${DOCKHAND_WEBHOOK_URL}" \
              -H "Content-Type: application/json" \
              -d "${payload}"
          fi
