# Traefik must share a Docker network with `app` (same name Traefik uses, e.g. `frontend` or `proxy`).
# Set ONE of:
#   TRAEFIK_NETWORK=frontend   (preferred name for this file)
#   FRONTEND_NETWORK=frontend  (alias; used if TRAEFIK_NETWORK is unset)
# Defaults to `proxy` if neither is set (external network must already exist: docker network create proxy).
#
# Interpolation (${HOST}, network name, etc.) uses your shell + a .env file next to this compose file’s
# project directory. If you see "HOST is not set" or "network proxy ... could not be found", Compose
# did not load your .env. Fix: run from the repo root, or pass the file explicitly, e.g.:
#   docker compose --env-file .env -f docker-compose-traefik.yml up -d
#
# Required for routing: HOST=your.public.domain (used in Host() rule and ALLOWED_ORIGINS)
# Optional: TRAEFIK_ENTRYPOINTS=websecure   (or web,websecure — must match your Traefik static config)
# Optional: TRAEFIK_TLS=true|false  (set false for HTTP-only entrypoint `web`)
# For ACME, add a compose override with e.g. traefik.http.routers.goloom.tls.certresolver=myresolver

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: goloom-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://${DATABASE_USER:-postgres}:${DATABASE_PASSWORD:-postgres}@db:5432/${DATABASE_NAME:-goloom}?sslmode=disable
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://${HOST}}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://${HOST}}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-120}
      SCHEDULER_POLL_INTERVAL: ${SCHEDULER_POLL_INTERVAL:-15s}
      SCHEDULER_WORKERS: ${SCHEDULER_WORKERS:-4}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@localhost}
      BOOTSTRAP_ADMIN_NAME: ${BOOTSTRAP_ADMIN_NAME:-Local Administrator}
      BOOTSTRAP_ADMIN_TOKEN: ${BOOTSTRAP_ADMIN_TOKEN:-change-this-bootstrap-token}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-}
      MASTODON_APP_NAME: ${MASTODON_APP_NAME:-goloom}
      MASTODON_WEBSITE: ${MASTODON_WEBSITE:-}
      MASTODON_DEFAULT_SCOPES: ${MASTODON_DEFAULT_SCOPES:-read,write}
      MASTODON_REDIRECT_URI: ${MASTODON_REDIRECT_URI:-}
    volumes:
      - goloom_data:/app/data
    networks:
      - traefik
      - backend
    labels:
      - traefik.enable=true
      # When the container is on multiple networks, Traefik must use the one it shares with the proxy.
      - traefik.docker.network=${TRAEFIK_NETWORK:-${FRONTEND_NETWORK:-proxy}}
      - traefik.http.services.goloom.loadbalancer.server.port=8080
      - traefik.http.routers.goloom.service=goloom
      - traefik.http.routers.goloom.rule=Host(`${HOST}`)
      - traefik.http.routers.goloom.entrypoints=${TRAEFIK_ENTRYPOINTS:-websecure}
      - traefik.http.routers.goloom.tls=${TRAEFIK_TLS:-true}

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: goloom-ai
    restart: unless-stopped
    environment:
      GOLOOM_API_URL: ${GOLOOM_API_URL:-http://app:8080}
      GOLOOM_API_TOKEN: ${GOLOOM_API_TOKEN:?GOLOOM_API_TOKEN is required for the AI service}
      LLM_ROUTER_PROVIDER: ${LLM_ROUTER_PROVIDER:-openai}
      LLM_ROUTER_MODEL: ${LLM_ROUTER_MODEL:-gpt-4o-mini}
      LLM_GENERATOR_PROVIDER: ${LLM_GENERATOR_PROVIDER:-openai}
      LLM_GENERATOR_MODEL: ${LLM_GENERATOR_MODEL:-gpt-4o}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      REDIS_URL: ${AI_REDIS_URL:-}
      LOG_LEVEL: ${AI_LOG_LEVEL:-INFO}
      PROACTIVE_ENABLED: ${AI_PROACTIVE_ENABLED:-false}
      PROACTIVE_INTERVAL_SECONDS: ${AI_PROACTIVE_INTERVAL_SECONDS:-3600}
    networks:
      - backend
    # Uncomment to expose the AI service through Traefik (e.g. for webhook callbacks):
    # labels:
    #   - traefik.enable=true
    #   - traefik.docker.network=${TRAEFIK_NETWORK:-${FRONTEND_NETWORK:-proxy}}
    #   - traefik.http.services.goloom-ai.loadbalancer.server.port=8090
    #   - traefik.http.routers.goloom-ai.service=goloom-ai
    #   - traefik.http.routers.goloom-ai.rule=Host(`ai-${HOST}`)
    #   - traefik.http.routers.goloom-ai.entrypoints=${TRAEFIK_ENTRYPOINTS:-websecure}
    #   - traefik.http.routers.goloom-ai.tls=${TRAEFIK_TLS:-true}
  db:
    image: postgres:16
    container_name: goloom-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-goloom}
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"${DATABASE_USER:-postgres}\" -d \"${DATABASE_NAME:-goloom}\""]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

volumes:
  goloom_data:
  postgres_data:

networks:
  traefik:
    name: ${TRAEFIK_NETWORK:-${FRONTEND_NETWORK:-proxy}}
    external: true
  backend:
    driver: bridge
