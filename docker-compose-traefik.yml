# App joins both the external Traefik network (routing) and an internal bridge so the
# hostname `db` resolves to the Postgres container. If `app` is only on Traefik and `db`
# stays on the default network, they cannot reach each other and `db` may resolve via
# public DNS to unrelated IPs (connection timeouts / wrong host).
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: goloom-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: development
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://${DATABASE_USER:-postgres}:${DATABASE_PASSWORD:-postgres}@db:5432/${DATABASE_NAME:-goloom}?sslmode=disable
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ALLOWED_ORIGINS: https://${HOST}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-60}
      SCHEDULER_POLL_INTERVAL: ${SCHEDULER_POLL_INTERVAL:-15s}
      SCHEDULER_WORKERS: ${SCHEDULER_WORKERS:-4}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@localhost}
      BOOTSTRAP_ADMIN_NAME: ${BOOTSTRAP_ADMIN_NAME:-Local Administrator}
      BOOTSTRAP_ADMIN_TOKEN: ${BOOTSTRAP_ADMIN_TOKEN:-change-this-bootstrap-token}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
    volumes:
      - goloom_data:/app/data
    networks:
      - traefik
      - backend

  db:
    image: postgres:16
    container_name: goloom-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-goloom}
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"${DATABASE_USER:-postgres}\" -d \"${DATABASE_NAME:-goloom}\""]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

volumes:
  goloom_data:
  postgres_data:

networks:
  traefik:
    name: ${TRAEFIK_NETWORK:-proxy}
    external: true
  backend:
    driver: bridge