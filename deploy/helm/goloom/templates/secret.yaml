{{- if and .Values.secret.create (not .Values.secret.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "goloom.fullname" . }}
  labels:
    {{- include "goloom.labels" . | nindent 4 }}
type: Opaque
stringData:
  ENCRYPTION_KEY: {{ required "secret.encryptionKey is required (generate a long random value and keep it stable) — or set secret.existingSecret" .Values.secret.encryptionKey | quote }}
  BOOTSTRAP_ADMIN_TOKEN: {{ required "secret.bootstrapAdminToken is required — or set secret.existingSecret" .Values.secret.bootstrapAdminToken | quote }}
  {{- if eq .Values.database.type "postgres" }}
  DATABASE_URL: {{ required "database.postgres.url is required when database.type=postgres — or provide it via secret.existingSecret" .Values.database.postgres.url | quote }}
  {{- end }}
  {{- if .Values.oidc.enabled }}
  OIDC_CLIENT_SECRET: {{ .Values.oidc.clientSecret | quote }}
  {{- end }}
{{- end }}
